<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الملف الشخصي</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/edit-profile.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <script>
        (function () {
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t === 'system'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : t);
        })();
    </script>
</head>

<body>
    <div class="ep-wrapper">

        <!-- Back -->
        <button class="ep-back" onclick="goBack()">
            <i class="ri-arrow-left-line" id="backIcon"></i>
            <span id="backText">العودة للوحة التحكم</span>
        </button>

        <!-- Page heading -->
        <h1 class="ep-page-title" id="epPageTitle">تعديل الملف الشخصي</h1>
        <p class="ep-page-sub" id="epPageSub">يمكنك تعديل الاسم وكلمة المرور بشكل مستقل</p>

        <!-- Current profile info -->
        <div class="ep-profile-row">
            <div class="ep-avatar"><i class="ri-user-3-fill"></i></div>
            <div class="ep-profile-info">
                <h3 id="epCurrentName">—</h3>
                <span class="ep-role-badge" id="epRoleBadge">Admin</span>
            </div>
        </div>

        <!-- ══ Section 1: Update Name ══ -->
        <div class="ep-section ep-section-name">
            <div class="ep-section-header">
                <div class="ep-section-icon"><i class="ri-user-line"></i></div>
                <div>
                    <h4 id="titleName">تعديل اسم المدير</h4>
                    <p id="subName">تغيير اسم عرض الحساب</p>
                </div>
            </div>

            <div class="ep-field">
                <label id="labelName">الاسم الجديد</label>
                <div class="ep-input-wrap">
                    <i class="ri-user-line ep-icon"></i>
                    <input type="text" id="epName" placeholder="أدخل الاسم الجديد" autocomplete="username">
                </div>
            </div>

            <button type="button" class="ep-submit ep-submit-name" id="btnSaveName" onclick="saveName()">
                <i class="ri-save-line"></i>
                <span id="saveName_text">حفظ الاسم</span>
            </button>
        </div>

        <!-- ══ Section 2: Update Password ══ -->
        <div class="ep-section ep-section-pw">
            <div class="ep-section-header">
                <div class="ep-section-icon"><i class="ri-lock-line"></i></div>
                <div>
                    <h4 id="titlePw">تغيير كلمة المرور</h4>
                    <p id="subPw">اختر كلمة مرور قوية وآمنة</p>
                </div>
            </div>

            <div class="ep-field">
                <label id="labelNewPw">كلمة المرور الجديدة</label>
                <div class="ep-input-wrap">
                    <i class="ri-lock-line ep-icon"></i>
                    <input type="password" id="epPw" placeholder="أدخل كلمة مرور جديدة" autocomplete="new-password"
                        oninput="checkStrength()">
                    <button type="button" class="ep-pw-toggle" onclick="togglePw('epPw','pwIcon')">
                        <i class="ri-eye-line" id="pwIcon"></i>
                    </button>
                </div>
                <!-- Strength bar -->
                <div class="ep-pw-strength">
                    <div class="ep-pw-strength-bar" id="pwStrBar"></div>
                </div>
                <span class="ep-pw-hint" id="pwStrHint"></span>
            </div>

            <div class="ep-field">
                <label id="labelConfirmPw">تأكيد كلمة المرور</label>
                <div class="ep-input-wrap">
                    <i class="ri-lock-2-line ep-icon"></i>
                    <input type="password" id="epPwConfirm" placeholder="أعد إدخال كلمة المرور"
                        autocomplete="new-password">
                    <button type="button" class="ep-pw-toggle" onclick="togglePw('epPwConfirm','pwCIcon')">
                        <i class="ri-eye-line" id="pwCIcon"></i>
                    </button>
                </div>
            </div>

            <button type="button" class="ep-submit ep-submit-pw" id="btnSavePw" onclick="savePassword()">
                <i class="ri-key-line"></i>
                <span id="savePw_text">تغيير كلمة المرور</span>
            </button>
        </div>

    </div>

    <!-- Toast -->
    <div class="ep-toast" id="epToast">
        <i class="ri-check-double-line"></i>
        <span id="epToastMsg">تم التحديث بنجاح</span>
    </div>

    <script src="js/lang.js"></script>
    <script src="js/api.js"></script>
    <script>
        // ── Auth guard ──
        const user = getUser();
        if (!user || user.role !== 'Admin') window.location.href = 'index.html';

        // ── Language & Direction ──
        const lang = localStorage.getItem('lang') || 'ar';
        document.documentElement.lang = lang;
        document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';

        if (lang === 'ar') {
            document.getElementById('backIcon').className = 'ri-arrow-right-line';
        }

        // ── Populate ──
        document.getElementById('epCurrentName').innerText = user.username || '—';
        document.getElementById('epName').value = user.username || '';
        document.getElementById('epRoleBadge').innerText = user.role || 'Admin';

        // ── English labels ──
        if (lang === 'en') {
            document.getElementById('backText').innerText = 'Back to Dashboard';
            document.getElementById('epPageTitle').innerText = 'Edit Profile';
            document.getElementById('epPageSub').innerText = 'Update your name and password independently';
            document.getElementById('titleName').innerText = 'Update Admin Name';
            document.getElementById('subName').innerText = 'Change your display name';
            document.getElementById('labelName').innerText = 'New Name';
            document.getElementById('epName').placeholder = 'Enter new name';
            document.getElementById('saveName_text').innerText = 'Save Name';
            document.getElementById('titlePw').innerText = 'Change Password';
            document.getElementById('subPw').innerText = 'Choose a strong, secure password';
            document.getElementById('labelNewPw').innerText = 'New Password';
            document.getElementById('epPw').placeholder = 'Enter new password';
            document.getElementById('labelConfirmPw').innerText = 'Confirm Password';
            document.getElementById('epPwConfirm').placeholder = 'Re-enter new password';
            document.getElementById('savePw_text').innerText = 'Change Password';
        }

        // ── Helpers ──
        function goBack() { window.location.href = 'dashboard.html'; }

        function togglePw(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            icon.className = show ? 'ri-eye-off-line' : 'ri-eye-line';
        }

        function showToast(msg) {
            const toast = document.getElementById('epToast');
            if (msg) document.getElementById('epToastMsg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function setBtn(btnId, textId, state, text) {
            const btn = document.getElementById(btnId);
            btn.disabled = state === 'loading';
            btn.style.opacity = state === 'loading' ? '0.7' : '';
            if (state === 'success') {
                btn.classList.add('success');
                btn.innerHTML = '<i class="ri-check-double-line"></i><span>' + text + '</span>';
            } else if (state === 'reset') {
                btn.classList.remove('success');
            }
        }

        // ── Password strength ──
        function checkStrength() {
            const pw = document.getElementById('epPw').value;
            const bar = document.getElementById('pwStrBar');
            const hint = document.getElementById('pwStrHint');
            let score = 0;
            if (pw.length >= 8) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;

            const levels = [
                { w: '0%', bg: '', txt: '' },
                { w: '25%', bg: 'var(--danger)', txt: lang === 'ar' ? 'ضعيفة جداً' : 'Very weak' },
                { w: '50%', bg: 'var(--warning)', txt: lang === 'ar' ? 'متوسطة' : 'Fair' },
                { w: '75%', bg: 'var(--info)', txt: lang === 'ar' ? 'جيدة' : 'Good' },
                { w: '100%', bg: 'var(--success)', txt: lang === 'ar' ? 'قوية' : 'Strong' },
            ];
            const lvl = pw.length === 0 ? levels[0] : levels[score] || levels[1];
            bar.style.width = lvl.w;
            bar.style.background = lvl.bg;
            hint.innerText = lvl.txt;
        }

        // ── Save name ──
        async function saveName() {
            const newName = document.getElementById('epName').value.trim();
            if (!newName) {
                const inp = document.getElementById('epName');
                inp.style.borderColor = 'var(--danger)';
                inp.focus();
                setTimeout(() => inp.style.borderColor = '', 1500);
                return;
            }

            setBtn('btnSaveName', 'saveName_text', 'loading');
            try {
                await apiFetch('/Auth/update-profile', 'PUT', { username: newName, password: null });
                user.username = newName;
                localStorage.setItem('user', JSON.stringify(user));
                document.getElementById('epCurrentName').innerText = newName;
                setBtn('btnSaveName', 'saveName_text', 'success', lang === 'ar' ? '✓ تم الحفظ' : '✓ Saved');
                showToast(lang === 'ar' ? 'تم تحديث الاسم بنجاح' : 'Name updated successfully');
                setTimeout(() => {
                    setBtn('btnSaveName', 'saveName_text', 'reset');
                    document.getElementById('btnSaveName').innerHTML =
                        '<i class="ri-save-line"></i><span>' + (lang === 'ar' ? 'حفظ الاسم' : 'Save Name') + '</span>';
                }, 3000);
            } catch (err) {
                alert(err.message || (lang === 'ar' ? 'حدث خطأ' : 'Error'));
            } finally {
                document.getElementById('btnSaveName').disabled = false;
                document.getElementById('btnSaveName').style.opacity = '';
            }
        }

        // ── Save password ──
        async function savePassword() {
            const pw = document.getElementById('epPw').value;
            const pwConf = document.getElementById('epPwConfirm').value;

            if (!pw) {
                const inp = document.getElementById('epPw');
                inp.style.borderColor = 'var(--danger)';
                inp.focus();
                setTimeout(() => inp.style.borderColor = '', 1500);
                return;
            }
            if (pw !== pwConf) {
                const inp = document.getElementById('epPwConfirm');
                inp.style.borderColor = 'var(--danger)';
                inp.focus();
                inp.placeholder = lang === 'ar' ? 'كلمتا المرور غير متطابقتين!' : 'Passwords do not match!';
                setTimeout(() => {
                    inp.style.borderColor = '';
                    inp.placeholder = lang === 'ar' ? 'أعد إدخال كلمة المرور' : 'Re-enter new password';
                }, 2000);
                return;
            }

            setBtn('btnSavePw', 'savePw_text', 'loading');
            try {
                await apiFetch('/Auth/update-profile', 'PUT', { username: user.username, password: pw });
                document.getElementById('epPw').value = '';
                document.getElementById('epPwConfirm').value = '';
                document.getElementById('pwStrBar').style.width = '0%';
                document.getElementById('pwStrHint').innerText = '';

                setBtn('btnSavePw', 'savePw_text', 'success', lang === 'ar' ? '✓ تم التغيير' : '✓ Changed');
                showToast(lang === 'ar' ? 'تم تغيير كلمة المرور بنجاح' : 'Password changed successfully');
                setTimeout(() => {
                    setBtn('btnSavePw', 'savePw_text', 'reset');
                    document.getElementById('btnSavePw').innerHTML =
                        '<i class="ri-key-line"></i><span>' + (lang === 'ar' ? 'تغيير كلمة المرور' : 'Change Password') + '</span>';
                }, 3000);
            } catch (err) {
                alert(err.message || (lang === 'ar' ? 'حدث خطأ' : 'Error'));
            } finally {
                document.getElementById('btnSavePw').disabled = false;
                document.getElementById('btnSavePw').style.opacity = '';
            }
        }
    </script>
</body>

</html>
